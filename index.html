<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LearnFlow — Modern Learning Management System with 200+ expert courses in web development, AI, cloud, and more." />
    <meta name="theme-color" content="#6370f5" />
    <title>LearnFlow — Modern Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #0a0a0f; }
      #root-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0a0a0f; z-index: 9999; transition: opacity 0.3s ease;
      }
      #root-loader .spinner {
        width: 44px; height: 44px; border-radius: 50%;
        border: 3px solid rgba(99,112,245,0.2);
        border-top-color: #6370f5;
        animation: spin 0.8s linear infinite;
      }
      #root-loader .logo {
        position: absolute;
        width: 28px; height: 28px;
        background: linear-gradient(135deg, #6370f5, #4f4de8);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <div class="spinner"></div>
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Remove loader once React mounts
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root')
          if (root && root.children.length > 0) {
            const loader = document.getElementById('root-loader')
            if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 300); }
            observer.disconnect()
          }
        })
        observer.observe(document.getElementById('root'), { childList: true })
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
